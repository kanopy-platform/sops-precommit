version: "2"
linters:
  settings:
    staticcheck:
      checks:
        - all
        - '-ST1003'
        - '-ST1005'
        - '-ST1016'
  disable:
    - testpackage
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    paths:
      - third_party$
      - builtin$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
