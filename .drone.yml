---
kind: pipeline
type: kubernetes
name: default
workspace:
  path: /go/src/github.com/${DRONE_REPO}
volumes:
  - name: cache
    temp: {}
trigger:
  branch: [main]
steps:
  - name: test
    image: golangci/golangci-lint:v2.5
    volumes:
      - name: cache
        path: /go
    commands:
      - make test
    resources:
      requests:
        cpu: 500
        memory: 800MiB
